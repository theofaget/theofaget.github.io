<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <main>
        <section>
            <h2>Get in Touch</h2>
            <form action="mailto:example@example.com" method="post" enctype="text/plain">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br>
                <label for="phone">Phone:</label><br>
                <input type="tel" id="phone" name="phone" required><br>
                <input type="submit" value="Submit">
            </form>
        </section>
        <section>
            <h2>Connect with Us</h2>
            <ul>
                <li><a href="https://twitter.com/YourTwitterHandle">Twitter</a></li>
                <li><a href="https://facebook.com/YourFacebookPage">Facebook</a></li>
                <li><a href="https://instagram.com/YourInstagramHandle">Instagram</a></li>
            </ul>
        </section>
        <section>
            <h2>Availability</h2>
            <p>We are available Monday to Friday from 9 AM to 5 PM UTC. </p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Theofaget. All rights reserved.</p>
    </footer>
</body>
</html>
