<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .project {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
        }
        .project img {
            max-width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Projects Gallery</h1>
    <div class="gallery">
        <div class="project">
            <h2>Storage Energy</h2>
            <img src="storage_energy_image.jpg" alt="Storage Energy">
            <p>Description of the Storage Energy project.</p>
        </div>
        <div class="project">
            <h2>Formula Student</h2>
            <img src="formula_student_image.jpg" alt="Formula Student">
            <p>Description of the Formula Student project.</p>
        </div>
        <div class="project">
            <h2>EMS</h2>
            <img src="ems_image.jpg" alt="EMS">
            <p>Description of the EMS project.</p>
        </div>
    </div>
</body>
</html>
